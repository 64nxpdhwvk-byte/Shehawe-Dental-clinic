name: Apply multilingual SEO update

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/apply-multilingual-seo.yml

permissions:
  contents: write

jobs:
  apply-multilingual-seo:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Apply multilingual SEO changes
        run: |
          python3 - <<'PY'
          from pathlib import Path

          x_defaults = {
              "index.html": (
                  '  <link rel="alternate" hreflang="en" href="https://shehawydentalclinic.com/en/">\n',
                  '  <link rel="alternate" hreflang="x-default" href="https://shehawydentalclinic.com/">\n',
              ),
              "en/index.html": (
                  '  <link rel="alternate" hreflang="en" href="https://shehawydentalclinic.com/en/">\n',
                  '  <link rel="alternate" hreflang="x-default" href="https://shehawydentalclinic.com/">\n',
              ),
              "services/index.html": (
                  '  <link rel="alternate" hreflang="en" href="https://shehawydentalclinic.com/en/services/">\n',
                  '  <link rel="alternate" hreflang="x-default" href="https://shehawydentalclinic.com/services/">\n',
              ),
              "en/services/index.html": (
                  '  <link rel="alternate" hreflang="en" href="https://shehawydentalclinic.com/en/services/">\n',
                  '  <link rel="alternate" hreflang="x-default" href="https://shehawydentalclinic.com/services/">\n',
              ),
              "team/index.html": (
                  '  <link rel="alternate" hreflang="en" href="https://shehawydentalclinic.com/en/team/">\n',
                  '  <link rel="alternate" hreflang="x-default" href="https://shehawydentalclinic.com/team/">\n',
              ),
              "en/team/index.html": (
                  '  <link rel="alternate" hreflang="en" href="https://shehawydentalclinic.com/en/team/">\n',
                  '  <link rel="alternate" hreflang="x-default" href="https://shehawydentalclinic.com/team/">\n',
              ),
          }

          for file_name, (marker, addition) in x_defaults.items():
              path = Path(file_name)
              text = path.read_text(encoding="utf-8")
              if addition not in text:
                  if marker not in text:
                      raise SystemExit(f"Missing hreflang marker in {file_name}")
                  text = text.replace(marker, marker + addition, 1)
                  path.write_text(text, encoding="utf-8")

          script_path = Path("scripts/main.js")
          script = script_path.read_text(encoding="utf-8")
          redirect_block = """  function applyPreferredLanguage() {
            const stored = localStorage.getItem(preferredKey);
            if (!stored) return;
            const { language, page } = getPathInfo();
            if (stored !== language) {
              const destination = buildPath(stored, page);
              if (normalizePathname(destination) !== normalizePathname(window.location.pathname)) {
                window.location.replace(destination);
              }
            }
          }

          """
          script = script.replace(redirect_block, "")
          script = script.replace("    applyPreferredLanguage();\n", "")
          script_path.write_text(script, encoding="utf-8")

          expected = {
              "index.html": "https://shehawydentalclinic.com/",
              "en/index.html": "https://shehawydentalclinic.com/",
              "services/index.html": "https://shehawydentalclinic.com/services/",
              "en/services/index.html": "https://shehawydentalclinic.com/services/",
              "team/index.html": "https://shehawydentalclinic.com/team/",
              "en/team/index.html": "https://shehawydentalclinic.com/team/",
          }
          for file_name, url in expected.items():
              needle = f'<link rel="alternate" hreflang="x-default" href="{url}">'
              if needle not in Path(file_name).read_text(encoding="utf-8"):
                  raise SystemExit(f"Missing x-default in {file_name}")

          script = script_path.read_text(encoding="utf-8")
          forbidden = ["applyPreferredLanguage", "localStorage.getItem", "window.location.replace"]
          for item in forbidden:
              if item in script:
                  raise SystemExit(f"Automatic redirect code still present: {item}")
          if "localStorage.setItem(preferredKey, targetLang);" not in script:
              raise SystemExit("Language preference storage on explicit switch is missing")
          if "window.location.href = destination;" not in script:
              raise SystemExit("Language switch navigation is missing")
          PY

          rm -f .github/workflows/apply-multilingual-seo.yml
          git status --short

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Improve bilingual hreflang handling"
          git push origin HEAD:main
