name: Update Instagram link

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/update-instagram-link.yml

permissions:
  contents: write

jobs:
  update-instagram-link:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Replace Instagram URL
        env:
          OLD_URL: https://www.instagram.com/shdc2016
          NEW_URL: https://www.instagram.com/shehawy_dent_clinic/
        run: |
          python3 - <<'PY'
          import os
          import subprocess
          from pathlib import Path

          old_text = os.environ["OLD_URL"]
          old = old_text.encode("utf-8")
          new = os.environ["NEW_URL"].encode("utf-8")

          result = subprocess.run(
              ["git", "grep", "-Ilz", old_text, "--"],
              check=False,
              stdout=subprocess.PIPE,
          )

          for raw_path in result.stdout.split(b"\0"):
              if not raw_path:
                  continue
              path = Path(raw_path.decode("utf-8"))
              data = path.read_bytes()
              if old in data:
                  path.write_bytes(data.replace(old, new))
          PY

          rm -f .github/workflows/update-instagram-link.yml
          git status --short

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Update Instagram links"
          git push origin HEAD:main
