name: Apply metadata optimization

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/apply-metadata-optimization.yml

permissions:
  contents: write

jobs:
  apply-metadata-optimization:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Apply approved metadata patch
        run: |
          git show HEAD^:.github/workflows/apply-metadata-optimization.yml \
            | awk '/^ZGlmZi/{flag=1} flag{print} /^PATCH_B64$/{flag=0}' \
            | sed '$d' > /tmp/metadata.patch.b64
          test -s /tmp/metadata.patch.b64
          base64 -d /tmp/metadata.patch.b64 > /tmp/metadata.patch
          git apply --check /tmp/metadata.patch
          git apply /tmp/metadata.patch
          rm -f .github/workflows/apply-metadata-optimization.yml
          git status --short

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Optimize bilingual page metadata"
          git push origin HEAD:main
